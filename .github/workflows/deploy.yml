name: Build and Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build application with Maven
        run: |
          chmod +x simple_application/mvnw
          cd simple_application
          ./mvnw clean package -DskipTests=true

      - name: Prepare deployment bundle
        run: |
          mkdir -p deployment
          cp simple_application/target/simple_application-0.0.1-SNAPSHOT.jar deployment/myapp.jar
          cp deploy/Procfile deployment/Procfile
          cd deployment
          zip -r ../application-bundle-${{ github.sha }}.zip . -x "*.DS_Store"
          cd ..
          ls -lh application-bundle-${{ github.sha }}.zip

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp application-bundle-${{ github.sha }}.zip s3://${{ env.S3_BUCKET_NAME }}/
          echo "Uploaded to: s3://${{ env.S3_BUCKET_NAME }}/application-bundle-${{ github.sha }}.zip"

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket=${{ env.S3_BUCKET_NAME }},S3Key=application-bundle-${{ github.sha }}.zip \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-name ${{ env.EB_ENVIRONMENT_NAME }} \
            --version-label ${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for Elastic Beanstalk deployment..."
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify deployment
        run: |
          ENV_STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APPLICATION_NAME }} \
            --environment-names ${{ env.EB_ENVIRONMENT_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Environments[0].Status' \
            --output text)
          echo "Environment Status: $ENV_STATUS"
          if [ "$ENV_STATUS" = "Ready" ]; then
            echo "✅ Deployment successful!"
            exit 0
          else
            echo "Deployment failed. Status: $ENV_STATUS"
            exit 1
          fi

